name: Doc Check

on:
  push:
    branches: [main]
    paths: ["**.md", "**.txt", "**.toml", "requirements.txt"]
  pull_request:
    branches: [main]
    paths: ["**.md", "**.txt", "**.toml", "requirements.txt"]

jobs:
  doc-check:
    name: Documentation Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run doc consistency check
        run: bash .github/scripts/check-repo-docs.sh .
